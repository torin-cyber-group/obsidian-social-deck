name: Build plugin

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Assemble installable package
        run: |
          mkdir -p release
          cp main.js manifest.json styles.css release/
          cd release
          zip ../social-deck.zip main.js manifest.json styles.css

      - name: Upload build artifact
        uses: actions/upload-artifact@v6
        with:
          name: social-deck
          path: social-deck.zip
          if-no-files-found: error
          retention-days: 30

      - name: Publish tagged release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: social-deck.zip
          generate_release_notes: true
